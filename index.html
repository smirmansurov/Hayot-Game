<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hayot Ventures — Путь основателя</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600;1,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0F7A7A; --teal-accent:#2F9E9B; --teal-light:#D7E8E8;
    --orange:#F5A05A; --ink:#101820; --bg:#F4EEE4; --card:#FFFFFF;
    --muted:#5E6E6E; --dim:#93A3A3; --line:#E4EBEB; --red:#C8552B;
    --serif:"Playfair Display",Georgia,serif; --sans:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--sans);color:var(--ink);min-height:100vh;background:
      radial-gradient(800px 420px at 85% -10%,rgba(245,160,90,.10),transparent 60%),
      radial-gradient(900px 500px at 8% 0%,rgba(95,168,164,.14),transparent 55%),var(--bg);
    padding:0 0 36px;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px;}
  header{max-width:560px;margin:0 auto;padding:18px 18px 6px;display:flex;align-items:center;}
  .logo{height:26px;width:auto;}
  .tagline{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--teal);text-transform:uppercase;}

  /* resources */
  .res{display:flex;gap:10px;margin:14px 0 16px;}
  .rc{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;box-shadow:0 8px 22px rgba(16,24,32,.05);}
  .rc .top{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:700;}
  .rc .val{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-top:2px;transition:color .3s;}
  .rc .bar{height:5px;border-radius:3px;background:var(--line);margin-top:7px;overflow:hidden;}
  .rc .fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.3,1,.4,1);}
  .rc.money .fill{background:var(--teal);}
  .rc.users .fill{background:var(--orange);}
  .rc.team .fill{background:var(--teal-accent);}
  .flash{animation:flash .5s;}
  @keyframes flash{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}

  /* months progress */
  .months{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .mh{width:12px;height:14px;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:var(--teal-light);transition:.3s;}
  .mh.done{background:var(--teal-accent);}
  .mh.cur{background:var(--orange);transform:scale(1.2);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:24px 22px;
    box-shadow:0 12px 34px rgba(16,24,32,.07);animation:rise .4s ease both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .mlabel{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal-accent);}
  .ctitle{font-family:var(--serif);font-size:25px;font-weight:800;letter-spacing:-.2px;margin:7px 0 6px;line-height:1.22;}
  .cdesc{font-size:15px;color:var(--muted);line-height:1.55;margin-bottom:18px;}
  .opt{width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:14px;
    padding:14px 16px;font-size:15px;font-weight:700;font-family:var(--sans);color:var(--ink);cursor:pointer;
    transition:.18s;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .opt:hover{border-color:var(--teal-accent);}
  .opt:active{transform:scale(.99);}
  .opt .note{font-size:11px;color:var(--dim);font-weight:600;}
  .opt .arr{color:var(--orange);font-size:18px;flex:none;}

  /* toast of effects */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;border-radius:14px;padding:12px 18px;font-size:14px;font-weight:700;
    display:flex;gap:14px;transition:.3s;z-index:50;box-shadow:0 12px 30px rgba(0,0,0,.25);pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .up{color:#7FE0C0;} .toast .down{color:#F5A05A;}

  /* start / end screens */
  .hero{text-align:center;padding:8px 0;}
  .hero .big{width:84px;height:84px;margin:14px auto 16px;animation:spin 12s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hero h1{font-family:var(--serif);font-size:34px;font-weight:800;letter-spacing:-.3px;line-height:1.12;}
  .hero h1 .em{font-style:italic;color:var(--teal);}
  .hero p{color:var(--muted);font-size:15px;line-height:1.6;margin:12px 0 18px;}
  .how{display:flex;flex-direction:column;gap:8px;text-align:left;margin:14px 0 4px;}
  .how-row{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13.5px;line-height:1.45;color:var(--ink);}
  .how-n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--teal);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .how{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;text-align:left;margin-bottom:20px;}
  .how b{font-size:13px;}
  .how div{font-size:13px;color:var(--muted);line-height:1.7;margin-top:6px;}
  .btn{display:block;width:100%;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;
    cursor:pointer;font-family:var(--sans);transition:.2s;text-decoration:none;text-align:center;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--teal);color:#fff;box-shadow:0 10px 26px rgba(15,122,122,.32);}
  .btn-coral{background:var(--orange);color:#3A1D08;box-shadow:0 10px 26px rgba(245,160,90,.34);}
  .btn-ghost{background:#fff;color:var(--teal);border:1.5px solid var(--line);box-shadow:none;margin-top:10px;}

  .score{font-family:var(--sans);font-size:54px;font-weight:800;color:var(--teal);letter-spacing:-1px;}
  .loaninfo{background:#FFF1E6;border:1px solid #F5C9A6;color:#B5602A;border-radius:12px;padding:9px 12px;font-size:12.5px;font-weight:700;margin:8px auto 4px;max-width:300px;line-height:1.4;}
  .rank{display:inline-block;font-size:16px;font-weight:800;background:var(--teal-light);color:var(--teal);
    padding:8px 18px;border-radius:999px;margin:6px 0 14px;}
  .recap{display:flex;gap:10px;margin:6px 0 20px;}
  .recap .rc2{flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 8px;}
  .recap .rc2 b{display:block;font-size:18px;font-weight:800;}
  .recap .rc2 span{font-size:11px;color:var(--muted);font-weight:600;}
  .footer{text-align:center;color:var(--dim);font-size:10.5px;margin-top:20px;letter-spacing:.4px;font-weight:600;}
  .hidden{display:none;}

  /* ── анимированная сцена-ролик под вопросом (пиксель-стиль) ── */
  .scene{aspect-ratio:4/3;border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--line);position:relative;
    background:#EAF5F2;}
  .scene svg{display:block;width:100%;height:100%;}
  .scene-img{display:block;width:100%;height:100%;object-fit:cover;animation:sceneKen 9s ease-in-out infinite alternate;}
  @keyframes sceneFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.015)}}
  .scene-live{position:relative;overflow:hidden;}
  .scene::after,.scene-live::after{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.22) 50%,transparent 58%);transform:translateX(-130%);animation:shineSweep 5s ease-in-out infinite;}
  @keyframes shineSweep{0%{transform:translateX(-130%)}60%,100%{transform:translateX(130%)}}
  html,body{touch-action:manipulation;}
  .tap-btn,.fly-wrap,#fly,.opt,.btn{touch-action:manipulation;}
  @keyframes sceneKen{from{transform:scale(1.0)}to{transform:scale(1.03)}}
  .scene-cap{font-size:13px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:16px;line-height:1.4;}
  .px{shape-rendering:crispEdges;}
  .gnd{stroke:var(--teal-light);stroke-width:2;}
  .obj{transition:.3s;}
  /* rocket */
  @keyframes rk{0%,100%{transform:translateY(4px)}50%{transform:translateY(-6px)}}
  @keyframes flame{0%{transform:scaleY(.7);opacity:.7}100%{transform:scaleY(1.15);opacity:1}}
  .rk{animation:rk 2.2s ease-in-out infinite;transform-origin:center;}
  .fl{animation:flame .18s ease-in-out infinite alternate;transform-origin:top center;}
  /* coins */
  @keyframes drop{0%{transform:translateY(-40px);opacity:0}20%{opacity:1}100%{transform:translateY(46px);opacity:1}}
  .cn{animation:drop 1.7s ease-in infinite;}
  /* chart bars */
  @keyframes grow{0%{transform:scaleY(.25)}100%{transform:scaleY(1)}}
  .gb{transform-origin:bottom;animation:grow 1.6s ease-in-out infinite alternate;}
  /* people pulse */
  @keyframes pls{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.18);opacity:1}}
  .pp{animation:pls 1.5s ease-in-out infinite;transform-origin:center;}
  /* bug shake */
  @keyframes shk{0%,100%{transform:translate(0,0) rotate(0)}25%{transform:translate(-3px,1px) rotate(-4deg)}75%{transform:translate(3px,-1px) rotate(4deg)}}
  .bgx{animation:shk .35s ease-in-out infinite;transform-origin:center;}
  /* race */
  @keyframes race1{0%{transform:translateX(0)}100%{transform:translateX(46px)}}
  @keyframes race2{0%{transform:translateX(0)}100%{transform:translateX(34px)}}
  .rc1{animation:race1 1.6s ease-in-out infinite alternate;}
  .rc2x{animation:race2 1.6s ease-in-out infinite alternate;}
  /* handshake */
  @keyframes hsl{0%,100%{transform:translateX(0)}50%{transform:translateX(10px)}}
  @keyframes hsr{0%,100%{transform:translateX(0)}50%{transform:translateX(-10px)}}
  .hsl{animation:hsl 1.8s ease-in-out infinite;}
  .hsr{animation:hsr 1.8s ease-in-out infinite;}
  /* pivot turn */
  @keyframes turn{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
  .pv{animation:turn 4s linear infinite;transform-origin:center;}

  /* ── человечек Hayot Ventures: позы и сценки ── */
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .bob{animation:bob 1.7s ease-in-out infinite;}
  @keyframes pushp{0%,100%{transform:translateX(0) rotate(0)}50%{transform:translateX(5px) rotate(6deg)}}
  .push{animation:pushp 1.5s ease-in-out infinite;transform-origin:bottom center;}
  @keyframes liftup{0%{transform:translateY(8px)}55%{transform:translateY(0);opacity:1}100%{transform:translateY(-70px);opacity:0}}
  .rk2{animation:liftup 2.8s ease-in infinite;}
  @keyframes meetL{0%,100%{transform:translateX(0)}55%{transform:translateX(11px)}}
  @keyframes meetR{0%,100%{transform:translateX(0)}55%{transform:translateX(-11px)}}
  .meetL{animation:meetL 2s ease-in-out infinite;} .meetR{animation:meetR 2s ease-in-out infinite;}
  @keyframes spk{0%,55%{transform:scale(0)}72%{transform:scale(1.5)}100%{transform:scale(0)}}
  .spark{animation:spk 2s ease-in-out infinite;transform-origin:center;}
  @keyframes runx{0%{transform:translateX(0)}100%{transform:translateX(96px)}}
  .run{animation:runx 2.6s ease-in-out infinite alternate;}
  .run2{animation:runx 2.6s ease-in-out infinite alternate;opacity:.6;}
  @keyframes pointarm{0%,100%{transform:rotate(4deg)}50%{transform:rotate(-26deg)}}
  .armpt{animation:pointarm 1.6s ease-in-out infinite;transform-origin:8px 8px;}
  @keyframes droopy{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(4px) rotate(4deg)}}
  .droop{animation:droopy 2.1s ease-in-out infinite;transform-origin:bottom center;}
  @keyframes whackx{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(40deg)}}
  .whack{animation:whackx .55s ease-in-out infinite;transform-origin:6px 8px;}
  @keyframes sweat{0%{transform:translateY(0);opacity:0}30%{opacity:.9}100%{transform:translateY(12px);opacity:0}}
  .sweat{animation:sweat 1.7s ease-in infinite;}
  @keyframes flip{0%,100%{transform:scaleX(1)}50%{transform:scaleX(-1)}}
  .flip{animation:flip 3.2s ease-in-out infinite;transform-origin:center;}

  /* ── детали сценок ── */
  @keyframes smoke{0%{transform:translateY(0) scale(.5);opacity:.55}100%{transform:translateY(-24px) scale(1.4);opacity:0}}
  .smoke{animation:smoke 1.4s ease-out infinite;}
  @keyframes glint{0%,100%{opacity:.25}50%{opacity:1}}
  .glint{animation:glint 1.2s ease-in-out infinite;}
  @keyframes dust{0%{transform:translateX(0) scale(1);opacity:.5}100%{transform:translateX(-20px) scale(.3);opacity:0}}
  .dust{animation:dust 0.7s ease-out infinite;}
  @keyframes speed{to{stroke-dashoffset:-26}}
  .speed{stroke-dasharray:10 8;animation:speed .5s linear infinite;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  .floaty{animation:floaty 2.2s ease-in-out infinite;}
  @keyframes zzz{0%{transform:translateY(0);opacity:0}25%{opacity:1}100%{transform:translateY(-12px);opacity:0}}
  .zzz{animation:zzz 2.2s ease-in infinite;}
  @keyframes blip{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
  .blip{animation:blip 1s ease-in-out infinite;transform-origin:center;}
  @keyframes stamp{0%,40%{transform:scale(0) rotate(-12deg);opacity:0}55%{transform:scale(1.25) rotate(-12deg);opacity:1}70%,100%{transform:scale(1) rotate(-12deg);opacity:1}}
  .stamp{animation:stamp 2s ease-out infinite;transform-origin:center;}
  @keyframes bubble{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.04)}}
  .bubble{animation:bubble 2s ease-in-out infinite;transform-origin:center;}

  .dirs{display:flex;flex-direction:column;gap:10px;margin:6px 0 2px;}
  .dirbtn{display:flex;align-items:center;gap:12px;text-align:left;background:#fff;border:1.5px solid var(--line);
    border-radius:14px;padding:11px 13px;cursor:pointer;font-family:var(--sans);transition:.18s;width:100%;}
  .dirbtn:hover{border-color:var(--teal-accent);} .dirbtn:active{transform:scale(.99);}
  .dirbtn .dico{width:44px;height:44px;flex:none;background:#F0F8F8;border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .dirbtn .dtxt b{display:block;font-size:15px;font-weight:800;color:var(--ink);}
  .dirbtn .dtxt span{font-size:12px;color:var(--muted);}

  /* ── «прилёт супергероев» (инвестиции) ── */
  .rules{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;text-align:left;margin-bottom:14px;box-shadow:0 8px 22px rgba(16,24,32,.05);}
  .rules>b{font-size:14px;color:var(--ink);}
  .rules ul{margin:8px 0 0;padding-left:18px;}
  .rules li{font-size:13.5px;color:#46585A;line-height:1.55;margin-bottom:8px;}
  .rules li b{color:var(--ink);font-weight:700;}
  .rules-acc summary{cursor:pointer;font-weight:800;font-size:14px;color:var(--ink);display:flex;justify-content:space-between;align-items:center;list-style:none;user-select:none;}
  .rules-acc summary::-webkit-details-marker{display:none;}
  .rules-acc .chev{color:var(--teal);transition:transform .25s;font-size:13px;}
  .rules-acc[open] summary{margin-bottom:10px;}
  .rules-acc[open] .chev{transform:rotate(180deg);}
  .rules-acc ul{animation:fadein .3s ease;}
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .fadein{animation:fadein .35s ease;}
  .wbanner{position:relative;border-radius:14px;overflow:hidden;margin:4px 0 14px;border:1px solid var(--line);cursor:pointer;box-shadow:0 8px 20px rgba(16,24,32,.1);}
  .wbanner svg{display:block;width:100%;height:auto;}
  .wtag{position:absolute;left:10px;bottom:8px;background:rgba(15,122,122,.92);color:#fff;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;}
  @keyframes burstup{0%{opacity:1;transform:translate(-50%,0) scale(.6)}100%{opacity:0;transform:translate(-50%,-58px) scale(1.3)}}
  .burstfx{position:absolute;left:50%;top:52%;font-size:22px;pointer-events:none;animation:burstup .9s ease-out forwards;z-index:3;}
  .previewchips{display:flex;gap:8px;justify-content:center;margin:2px 0 6px;flex-wrap:wrap;}
  .pchip{background:#fff;border:1.5px solid var(--line);border-radius:999px;padding:8px 13px;font-weight:700;font-size:13px;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:6px;transition:.18s;font-family:var(--sans);}
  .pchip span{font-size:15px;}
  .pchip.on{border-color:var(--teal);background:var(--teal-light);color:var(--teal);transform:translateY(-2px);}
  .pchip:active{transform:scale(.95);}
  .chiptip{font-size:12.5px;color:var(--muted);font-weight:600;min-height:34px;margin-bottom:12px;line-height:1.4;text-align:center;}
  .tipcard{background:linear-gradient(135deg,#EAF5F2,#FFF1E6);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:12px;text-align:left;}
  .tiphead{font-size:13px;font-weight:800;color:var(--orange);margin-bottom:5px;}
  .tiptext{font-size:13px;color:#314244;line-height:1.5;min-height:58px;}
  .tipnav{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .tipdots{display:flex;gap:5px;}
  .tipdots i{width:6px;height:6px;border-radius:50%;background:var(--line);transition:.25s;}
  .tipdots i.on{background:var(--teal);width:16px;border-radius:3px;}
  .tipbtn{background:var(--teal);color:#fff;border:none;border-radius:10px;padding:8px 13px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:var(--sans);transition:.15s;}
  .tipbtn:active{transform:scale(.95);}
  .about-hv{background:linear-gradient(135deg,#0F7A7A,#2F9E9B);color:#fff;border-radius:16px;padding:15px 16px;text-align:left;margin-bottom:14px;box-shadow:0 10px 26px rgba(15,122,122,.28);}
  .about-hv .ah-head{font-size:14.5px;font-weight:800;margin-bottom:6px;}
  .about-hv .ah-text{font-size:13px;line-height:1.55;color:#EAF7F5;}
  .about-hv .ah-goals{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
  .about-hv .ah-goals span{background:rgba(255,255,255,.16);border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:700;}
  .fly-wrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(180deg,#8FC9E6 0%,#BBE0EA 38%,#E8F4F2 100%);}
  #fly{display:block;width:100%;height:auto;touch-action:manipulation;}
  .fly-score{position:absolute;top:8px;left:0;right:0;text-align:center;font-family:var(--sans);font-size:26px;font-weight:800;color:var(--teal);text-shadow:0 1px 0 #fff;pointer-events:none;}
  .fly-demo{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:12px;font-weight:800;color:#0F7A7A;pointer-events:none;}
  .fly-demo b{background:rgba(255,255,255,.82);border-radius:999px;padding:4px 12px;display:inline-block;}
  #flystartbtn{display:block;margin:12px auto 2px;max-width:230px;}
  .fly-start{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--teal-deep);font-size:16px;background:rgba(245,246,247,.42);text-align:center;padding:18px;pointer-events:none;line-height:1.5;}
  .fly-start .fs-inner{animation:fsPulse 1.2s ease-in-out infinite;}
  .fly-start .fs-inner span{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-top:5px;}
  @keyframes fsPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .fly-over{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;background:rgba(16,24,32,.5);padding:14px;overflow-y:auto;}
  .fly-card{background:#fff;border-radius:14px;padding:16px;text-align:center;width:100%;max-width:280px;margin:auto;box-shadow:0 14px 34px rgba(0,0,0,.3);}
  .fly-big{font-family:var(--sans);font-size:20px;font-weight:800;color:var(--ink);}
  .fly-sub{font-size:14px;color:var(--muted);margin:6px 0 12px;}
  .fly-card .btn{margin-top:8px;font-size:14px;padding:12px;}
  .orb-over{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(6,16,20,.74);padding:14px;}
  .orb-card{background:radial-gradient(120% 100% at 50% 0%,#123a45,#0a2129);border:1px solid #1f5b57;border-radius:16px;padding:16px 16px 14px;text-align:center;width:100%;max-width:300px;box-shadow:0 18px 40px rgba(0,0,0,.5);}
  .orb-ic{width:46px;height:46px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:24px;background:rgba(245,160,90,.16);border:1px solid rgba(245,160,90,.5);}
  .orb-tag{font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#5FD0C9;font-weight:800;margin-bottom:2px;}
  .orb-title{font-family:var(--serif);font-size:20px;font-weight:800;color:#EAF5F2;line-height:1.15;margin-bottom:4px;}
  .orb-score{font-size:13px;color:#a9bcba;margin-bottom:8px;} .orb-score b{color:#FFD27A;}
  .orb-text{font-size:12.5px;color:#bcd0ce;line-height:1.45;margin-bottom:12px;}
  .orb-card .btn{margin-top:8px;font-size:15px;padding:13px;}
  .orb-card .btn-ghost2{background:transparent;border:1px solid #2d6661;color:#a9bcba;box-shadow:none;}
  .fin-emblem{width:62px;height:62px;margin:2px auto 6px;animation:finspin 14s linear infinite;}
  .fin-emblem svg{width:62px;height:62px;display:block;}
  @keyframes finspin{to{transform:rotate(360deg);}}
  .cd-mask{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(16,24,32,.5);z-index:200;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);}
  .cd-num{font-family:var(--sans);font-weight:800;font-size:120px;line-height:1;color:#fff;text-shadow:0 10px 34px rgba(0,0,0,.35);animation:cdpop .8s ease both;}
  .cd-num.cd-go{font-size:58px;color:#F5A05A;}
  @keyframes cdpop{0%{transform:scale(.3);opacity:0}28%{transform:scale(1.12);opacity:1}72%{transform:scale(1);opacity:1}100%{transform:scale(.55);opacity:0}}
  .confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:215;overflow:hidden;}
  .confetti-layer i{position:absolute;border-radius:2px;opacity:0;animation-name:confburst;animation-timing-function:cubic-bezier(.2,.7,.3,1);animation-fill-mode:forwards;}
  @keyframes confburst{0%{opacity:1;transform:translate(0,0) rotate(0)}100%{opacity:0;transform:translate(var(--dx),130px) rotate(var(--rot))}}
  .att{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:700;color:var(--muted);margin:14px 0 4px;flex-wrap:wrap;}
  .att b{color:var(--teal);font-size:15px;}
  .invite{background:#F0F8F8;border:1.5px dashed var(--teal-accent);color:var(--teal);border-radius:13px;padding:12px;font-weight:800;font-size:14px;width:100%;cursor:pointer;font-family:var(--sans);}
  .scorebar{text-align:center;font-size:13px;font-weight:700;color:var(--muted);margin:10px 0 0;}
  .scorebar b{color:var(--teal);font-size:17px;}
  .scoregain{text-align:center;font-family:var(--sans);font-size:30px;font-weight:800;margin:6px 0 10px;letter-spacing:-.5px;}
  .scoregain.up{color:var(--teal);} .scoregain.down{color:var(--orange);}
  .verdict{text-align:center;font-size:15px;font-weight:800;letter-spacing:.5px;margin:4px 0 6px;}
  .verdict.up{color:var(--teal);} .verdict.down{color:#C8552B;}
  .cats .c b{display:block;font-size:16px;color:var(--teal);}
  .q-hint{font-size:12.5px;color:#46585A;background:#EAF5F2;border-radius:10px;padding:9px 11px;margin-bottom:10px;line-height:1.5;}
  .tap-mult{font-size:13.5px;font-weight:700;color:var(--muted);margin-top:4px;line-height:1.4;} .tap-mult b{color:var(--orange);}
  /* ── обучение (первый ход) ── */
  .tut-mask{position:fixed;inset:0;background:rgba(16,24,32,.55);z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:22px;}
  .tut-card{background:#fff;border-radius:16px;padding:18px;max-width:440px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.3);text-align:center;animation:fadeUp .3s ease both;}
  .tut-card .ic{font-size:30px;}
  .tut-card h3{font-size:17px;font-weight:800;margin:6px 0 4px;color:var(--ink);}
  .tut-card p{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:14px;}
  .tut-dots{display:flex;gap:5px;justify-content:center;margin-bottom:12px;}
  .tut-dots i{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .tut-dots i.on{background:var(--teal);}
  .rc.hl{outline:3px solid var(--orange);outline-offset:2px;transform:translateY(-3px);box-shadow:0 10px 24px rgba(245,160,90,.45);position:relative;z-index:61;}
  /* ── таймер срочного решения ── */
  .timer-lab{font-size:12.5px;font-weight:700;color:var(--muted);text-align:center;margin:-2px 0 6px;}
  .timer-lab b{color:var(--orange);}
  .qmark{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin:8px 0 10px;}
  .timer{height:8px;border-radius:5px;background:var(--line);overflow:hidden;margin:0 0 14px;}
  .timer i{display:block;height:100%;width:100%;background:var(--teal);transition:width .1s linear;}
  .timer.warn i{background:var(--orange);}
  /* ── тап-вызов (инвестиции) ── */
  .tap-wrap{text-align:center;position:relative;}
  .tap-raised{font-family:var(--sans);font-size:40px;font-weight:800;color:var(--teal);letter-spacing:-1px;}
  .tap-btn{width:122px;height:122px;border-radius:50%;border:none;cursor:pointer;margin:8px auto;display:block;
    background:radial-gradient(circle at 38% 32%,#F7B074,#E8743A);color:#3A1206;font-weight:800;font-size:19px;
    box-shadow:0 10px 26px rgba(232,116,58,.45);transition:transform .05s;user-select:none;-webkit-user-select:none;}
  .tap-btn:active{transform:scale(.9);}
  .tap-bar{height:10px;border-radius:6px;background:var(--teal-light);overflow:hidden;max-width:280px;margin:12px auto 0;}
  .tap-bar i{display:block;height:100%;width:100%;background:var(--orange);transition:width .1s linear;}
  .fund-stage{height:172px;border-radius:18px;position:relative;overflow:hidden;margin-bottom:16px;
    background:radial-gradient(120px 120px at 50% 42%,rgba(255,255,255,.35),transparent 70%),linear-gradient(135deg,#0F7A7A,#2F9E9B);}
  @keyframes rayspin{to{transform:rotate(360deg)}}
  .rays{animation:rayspin 14s linear infinite;transform-origin:center;}
  @keyframes flyL{0%{transform:translate(-130px,-46px) rotate(-22deg);opacity:0}65%{opacity:1}100%{transform:translate(0,0) rotate(0);opacity:1}}
  @keyframes flyR{0%{transform:translate(130px,-46px) rotate(22deg);opacity:0}65%{opacity:1}100%{transform:translate(0,0) rotate(0);opacity:1}}
  .flyL{animation:flyL 1s cubic-bezier(.2,1.3,.4,1) .15s both;}
  .flyR{animation:flyR 1s cubic-bezier(.2,1.3,.4,1) .35s both;}
  @keyframes cape{0%,100%{transform:skewX(0) scaleX(1)}50%{transform:skewX(-10deg) scaleX(1.06)}}
  .cape{animation:cape 1.3s ease-in-out infinite;transform-origin:top center;}
  @keyframes confetti{0%{transform:translateY(-30px) rotate(0);opacity:0}15%{opacity:1}100%{transform:translateY(150px) rotate(220deg);opacity:0}}
  .cf{animation:confetti linear infinite;}
  @keyframes popbig{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  .popbig{animation:popbig .6s cubic-bezier(.2,1.4,.4,1) .8s both;transform-origin:center;}
  @keyframes glowp{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:.7;transform:scale(1.12)}}
  .glowp{animation:glowp 1.8s ease-in-out infinite;transform-origin:center;}
  .rescue-stage{border-radius:12px;overflow:hidden;margin:2px 0 12px;box-shadow:0 8px 22px rgba(16,24,32,.2);}
  @keyframes rspeed{0%{transform:translateX(-30px);opacity:0}30%{opacity:.8}100%{transform:translateX(230px);opacity:0}}
  .speed-wrap line{animation:rspeed 1.05s linear infinite;}
  @keyframes pulsebtn{0%,100%{transform:scale(1);box-shadow:0 6px 18px rgba(245,160,90,.35)}50%{transform:scale(1.035);box-shadow:0 10px 26px rgba(245,160,90,.55)}}
  .btn.pulse{animation:pulsebtn 1.3s ease-in-out infinite;}
  @keyframes dashin{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes badgespin{0%{transform:scale(0) rotate(-90deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .badgein{animation:badgespin .7s cubic-bezier(.2,1.4,.4,1) both;transform-origin:center;}

  /* ── экран результата ── */
  .out-card{text-align:center;}
  .out-anim{height:96px;display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 14px;}
  .delta{display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(12px);}
  .delta.in{animation:popin .45s ease forwards;}
  .delta:nth-child(2){animation-delay:.15s;} .delta:nth-child(3){animation-delay:.3s;}
  @keyframes popin{to{opacity:1;transform:none}}
  .delta .ic{font-size:26px;}
  @keyframes optin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card .opt{animation:optin .34s ease both;}
  .card .opt:nth-of-type(2){animation-delay:.05s} .card .opt:nth-of-type(3){animation-delay:.1s} .card .opt:nth-of-type(4){animation-delay:.15s}
  @keyframes tapfx{0%{opacity:1;transform:translate(-50%,0) scale(.9)}25%{opacity:1;transform:translate(-50%,-10px) scale(1.18)}100%{opacity:0;transform:translate(-50%,-56px) scale(1)}}
  .tapfx{position:absolute;left:50%;top:30%;font-weight:800;color:#fff;font-size:19px;pointer-events:none;text-shadow:0 2px 9px rgba(232,116,58,.7);z-index:5;animation:tapfx .72s ease-out forwards;}
  @keyframes stickpop{0%{opacity:0;transform:translateY(10px) scale(.3)}45%{opacity:1;transform:translateY(0) scale(1.25)}100%{opacity:1;transform:translateY(0) scale(1)}}
  .stickers{display:flex;justify-content:center;gap:9px;font-size:26px;margin:-2px 0 8px;min-height:30px;}
  .stickers span{display:inline-block;animation:stickpop .52s ease both;}
  .stickers span:nth-child(2){animation-delay:.1s} .stickers span:nth-child(3){animation-delay:.2s} .stickers span:nth-child(4){animation-delay:.3s}
  .delta .num{font-size:20px;font-weight:800;margin-top:2px;}
  .delta .num.up{color:var(--teal);} .delta .num.down{color:var(--orange);}
  .out-text{font-size:15px;color:#46585A;line-height:1.55;margin-bottom:18px;min-height:22px;}
  .fund-pop{background:linear-gradient(135deg,#0F7A7A,#2F9E9B);color:#fff;border:none;}
  .fund-pop .ctitle,.fund-pop .mlabel{color:#fff;}
  .fund-pop .cdesc{color:rgba(255,255,255,.9);}
  .dico .dicoimg,.dicoimg{width:100%;height:100%;object-fit:contain;display:block;}
  .welcome-founder{text-align:center;margin:2px 0 6px;}
  .welcome-founder img{width:168px;max-width:56%;height:auto;filter:drop-shadow(0 14px 26px rgba(15,122,122,.22));animation:wfloat 3.4s ease-in-out infinite;}
  @keyframes wfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
</style>

const AB="https://gemini-mcp-production-bdc4.up.railway.app/img/";
const IMG={}, IMGU={};
const PX="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";
function assetSrc(k){ return IMGU[k] || PX; }
function _swap(k,url){ document.querySelectorAll('[data-asset="'+k+'"]').forEach(function(el){ if(el.tagName.toLowerCase()==="img") el.src=url; else el.setAttribute("href",url); }); }
function _cut(img){
  try{
    const c=document.createElement("canvas"); c.width=img.naturalWidth||img.width; c.height=img.naturalHeight||img.height;
    const x=c.getContext("2d"); x.drawImage(img,0,0);
    const d=x.getImageData(0,0,c.width,c.height), p=d.data;
    if(p[3]>=12){ const r=p[0],g=p[1],b=p[2];
      for(let i=0;i<p.length;i+=4){ if(Math.abs(p[i]-r)<45 && Math.abs(p[i+1]-g)<45 && Math.abs(p[i+2]-b)<45) p[i+3]=0; }
      x.putImageData(d,0,0);
    }
    return c;
  }catch(e){ return null; }
}
function _load(key,file,cut){
  const im=new Image(); im.crossOrigin="anonymous";
  im.onload=function(){
    if(cut){ const c=_cut(im); if(c){ IMG[key]=c; try{IMGU[key]=c.toDataURL("image/png");}catch(e){IMGU[key]=AB+file;} } else { IMG[key]=im; IMGU[key]=AB+file; } }
    else { IMG[key]=im; IMGU[key]=AB+file; }
    _swap(key, IMGU[key]);
  };
  im.onerror=function(){};
  im.src=AB+file;
}

function pick(a){return a[Math.random()*a.length|0];}
function buildFlow(dir){
  const x=SECTOR[dir];
  return [pick(STAGE.concept),pick(STAGE.prototype),pick(STAGE.users),pick(x.challenge),
          pick(STAGE.team),pick(STAGE.revenue),pick(STAGE.investor),pick(STAGE.growth),
          pick(STAGE.competitor),pick(STAGE.crisis),pick(x.scale),pick(STAGE.final)];
}

  const wrap=document.createElement("div"); wrap.className="confetti-layer"; document.body.appendChild(wrap);
  for(let k=0;k<n;k++){
    const p=document.createElement("i"), c=colors[k%colors.length];
    const left=12+Math.random()*76, dx=(Math.random()*2-1)*140, dur=0.9+Math.random()*0.8, rot=(Math.random()*760-380), w=6+Math.random()*6;
    p.style.cssText=`left:${left.toFixed(1)}%;top:36%;width:${w.toFixed(1)}px;height:${(w*0.5).toFixed(1)}px;background:${c};--dx:${dx.toFixed(0)}px;--rot:${rot.toFixed(0)}deg;animation-duration:${dur.toFixed(2)}s;animation-delay:${(Math.random()*0.12).toFixed(2)}s;`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(),1900);
}

  const mask=document.createElement("div"); mask.className="cd-mask"; document.body.appendChild(mask);
  const seq=["3","2","1","Старт!"]; let i=0;
  function step(){
    if(i>=seq.length){ mask.remove(); onDone&&onDone(); return; }
    const go=i===seq.length-1;
    mask.innerHTML=`<div class="cd-num${go?' cd-go':''}">${seq[i]}</div>`;
    try{const tg=window.Telegram&&window.Telegram.WebApp;tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(go?"heavy":"medium");}catch(e){}
    if(go) confettiBurst(34);
    i++; setTimeout(step, go?720:760);
  }
  step();
}

function applyChoice(o, elapsed, timedOut){
  const r=S.rng;
  const jit = v => Math.round(v*(0.85 + r()*0.30));   // антипаттерн: значения «плавают» ±15%
  let dm = o?jit(o.m):-7, du = o?jit(o.u):-350, dtm = o?jit(o.tm):-9;
  const fate={};
  if(o&&o.gamble){ const win=r()<0.5; fate.gamble=true; fate.win=win; if(win){dm=jit(25);du=jit(1800);dtm=jit(-4);} else {dm=jit(-6);du=jit(-200);dtm=jit(-6);} }
  if(o&&o.raise){ const win=r()<0.6; fate.raise=true; fate.win=win; if(win) dm+=jit(30); }
  S.money += dm; S.users = Math.max(0, S.users+du); S.team = clamp(S.team+dtm,0,100);
  const rev = Math.floor(S.users/CFG.fundFloor);
  S.money += rev - CFG.burn;
  // очки за ход: сила и баланс компании после решения + скорость ответа
  const speedFrac=timedOut?0:clamp(1-elapsed/S._tTotal,0,1);
  const strength = clamp(S.money,0,150)/150 + Math.min(S.users,8000)/8000 + S.team/100; // 0..3
  const moveScore = Math.round(strength*55);    // 0..165 за состояние компании
  const speedBonus = Math.round(speedFrac*60);  // 0..60 — бонус за быстрый ответ
  const gained = timedOut ? Math.max(0, moveScore-25) : (moveScore + speedBonus);
  S.score = Math.max(0, S.score + gained);
  S.log.events.push({q:S.month,opt:o?o.l:"timeout",t:+(elapsed||0).toFixed(2),dm,du,dtm,g:gained});
  const dMoney = dm + rev - CFG.burn;
  S.month++; flashBars(); renderHUD();
  const showOut = ()=>{ const expl = explain(o, dm, du, dtm, timedOut, fate); showOutcome(dMoney, du, dtm, gained, timedOut, expl); };
  if(S.money<0) return bankRescue(showOut);
  showOut();
}

      ${deltaCol("👥", dUsers)}
      ${deltaCol("⚡", dTeam)}
    </div>
    <div class="out-text" id="otext"></div>
    <button class="btn btn-primary" id="cont">${last ? "🏆 Финал →" : "Далее →"}</button>
  </div>`;
  requestAnimationFrame(()=>{
    scr.querySelectorAll(".delta").forEach(d=>d.classList.add("in"));
    scr.querySelectorAll(".num").forEach(n=>countTo(n, +n.dataset.to));
    const g=document.getElementById("gnum"); if(g) countTo(g, gained);
  });
  document.getElementById("otext").textContent = expl;
  document.getElementById("cont").addEventListener("click", continueAfterOutcome);
}
function outcomeStickers(dM,dU,dT,gained,timedOut){
  if(timedOut) return `<span>⏰</span><span>😬</span>`;
  const a=[];
  if(dU>0)a.push("📈"); else if(dU<0)a.push("📉");
  if(dM>0)a.push("💰"); else if(dM<0)a.push("💸");
  if(dT>0)a.push("💪"); else if(dT<0)a.push("😓");
  if(gained>=150)a.push("🚀"); else if(gained>=95)a.push("🔥");
  if(!a.length)a.push("🤔");
  return a.slice(0,4).map(e=>`<span>${e}</span>`).join("");
}
function deltaCol(ic, v){
  const cls = v>0?"up":(v<0?"down":"");
  const s = v>0?"+":"";
  return `<div class="delta"><div class="ic">${ic}</div><div class="num ${cls}" data-to="${v}">${s}0</div></div>`;
}
function countTo(el, to){
  const sign = to<0?"-":(to>0?"+":""); const abs=Math.abs(to); let t0=null; const dur=700;
  function step(ts){ if(!t0)t0=ts; const p=Math.min(1,(ts-t0)/dur);
    el.textContent = sign + Math.round(abs*p).toLocaleString("ru"); if(p<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}
function narrative(m,u,t){
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
  const p=[];
  if(u>0)p.push("пользовательская база выросла"); else if(u<0)p.push("часть пользователей отписалась");
  if(t>0)p.push("мотивация команды повысилась"); else if(t<0)p.push("мотивация команды снизилась");
  if(m>0)p.push("капитал увеличился"); else if(m<0)p.push("запас средств сократился");
  return p.length? cap(p.join(", "))+"." : "Существенных изменений не произошло.";
}
function fmtU(n){ n=Math.round(n); return (n>=0?"+":"−")+Math.abs(n).toLocaleString("ru"); }
function explain(o,dM,dU,dT,timedOut,fate){
  fate=fate||{};
  if(timedOut) return "Вы промедлили с решением. Конкуренты воспользовались паузой — компания потеряла темп, и показатели просели по всем направлениям.";
  let txt;
  if(o && o.why){
    txt = o.why
      .replace(/\{u\}/g, fmtU(dU))
      .replace(/\{un\}/g, Math.abs(Math.round(dU)).toLocaleString("ru"))
      .replace(/\{m\}/g, (dM>=0?"+$"+Math.round(dM):"\u2212$"+Math.abs(Math.round(dM)))+"K")
      .replace(/\{mc\}/g, "$"+Math.abs(Math.round(dM))+"K")
      .replace(/\{t\}/g, fmtU(dT));
  } else {
    const cz=[];
    if(dU>0) cz.push(`привлекло пользователей (${fmtU(dU)})`); else if(dU<0) cz.push(`вызвало отток (${fmtU(dU)})`);
    if(dM<0) cz.push(`потребовало затрат (\u2212$${Math.abs(Math.round(dM))}K)`); else if(dM>0) cz.push(`принесло средства (+$${Math.round(dM)}K)`);
    txt = cz.length? `Решение ${cz.join(" и ")}.` : "Решение существенно не изменило показатели.";
  }
  // чем закончился риск
  let risk="";
  if(fate.gamble){ risk = fate.win
    ? " \uD83C\uDFB2 Рискованная ставка сыграла: смелый ход выстрелил, и рынок откликнулся взрывным интересом."
    : " \uD83C\uDFB2 Рискованная ставка не зашла: рынок отреагировал прохладно, и часть усилий пропала даром."; }
  else if(fate.raise){ risk = fate.win
    ? " \uD83E\uDD1D Расчёт оправдался: переговоры прошли в вашу пользу, условия раунда улучшились."
    : " \uD83E\uDD1D В этот раз не сложилось: выйти на лучшие условия не удалось."; }
  // реакция метрик за ход
  const react=[];
  if(dU>=1000) react.push("пользователи хлынули волной");
  else if(dU>=400) react.push("аудитория заметно подросла");
  else if(dU>0) react.push("прибавилось немного пользователей");
  else if(dU<=-300) react.push("заметная часть пользователей ушла");
  else if(dU<0) react.push("несколько пользователей отписались");
  if(dT<=-12) react.push("команда вымоталась");
  else if(dT>=10) react.push("команда воспрянула духом");
  if(dM<=-10) react.push("бюджет ощутимо просел");
  else if(dM>=10) react.push("в кассе прибавилось");
  const reactS = react.length? " По итогам хода "+react.join(", ")+"." : "";
  // куда попала компания
  const cons=[];
  if(S.money<15) cons.push("Денег в обрез — компания у кассового разрыва, дальше нужна осторожность.");
  else if(S.money>=95) cons.push("Финансовая подушка солидная — есть пространство для манёвра.");
  if(S.team<35) cons.push("Команда на пределе и может посыпаться.");
  else if(S.team>=88) cons.push("Команда полна сил и готова к новым задачам.");
  if(S.users>=5000) cons.push("База пользователей уже внушительна и притягивает внимание инвесторов.");
  const consS = cons.length? " "+cons.slice(0,2).join(" ") : "";
  return txt + risk + reactS + consS;
}

function finale(){
  clearTimer();
  const cM=clamp(S.money,0,200)/100, cU=Math.min(S.users,10000)/5000, cT=S.team/100;
  const M = 1 + cM + cU + cT;
  const base = Math.round(S.score);
  const scr=document.getElementById("screen");
  scr.innerHTML = `<div class="card out-card">
    <div class="fin-emblem">${LOGO}</div>
    <div class="mlabel">🏆 Финал · Орбита стартапа</div>
    <div class="out-text" style="margin-bottom:8px;">Облетайте золотые монеты <b>монополиста</b> и собирайте <b>монеты Hayot</b>. <b>Тап</b> — разворот ракеты.</div>
    <div class="fly-wrap" id="flywrap" style="display:flex;align-items:center;justify-content:center;background:#08222A;">
      <canvas id="fly"></canvas>
    </div>
    <button class="btn btn-coral" id="flystartbtn">▶ Вывести стартап на орбиту</button>
    <div class="tap-mult">Бонус за силу компании: <b>×${M.toFixed(1)}</b> к очкам.</div>
  </div>`;
  renderHUD();
  const cv=document.getElementById("fly"), ctx=cv.getContext("2d");
  const wrap=document.getElementById("flywrap");
  const dpr=Math.min(window.devicePixelRatio||1,2);
  const cssW=Math.max(260, Math.round(wrap.clientWidth||320));
  const maxH=Math.round(clamp(window.innerHeight*0.52, 300, 440));
  const Sq=Math.min(cssW, maxH);
  cv.style.width=Sq+"px"; cv.style.height=Sq+"px";
  cv.width=Math.round(Sq*dpr); cv.height=Math.round(Sq*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const CX=Sq/2, CY=Sq/2, R=Sq*0.37, TAU=Math.PI*2;
  let stars=[]; { const n=Math.round(Sq*0.16); for(let i=0;i<n;i++) stars.push({x:Math.random()*Sq,y:Math.random()*Sq,r:Math.random()*1.4+0.3,tw:Math.random()*TAU}); }
  let raf=0, running=false, state="idle";
  let ang=-Math.PI/2, dir=1, oscore=0, t=0, spin=0;
  let projs=[], orbs=[], spawnT=46, fireFx=0, shake=0, hitFx=0;
  let round=1, shield=80, phaseT=0, dyingT=0, reviveT=0, ex=null;
  let parts=[], waves=[], clearFx=0, gemsTotal=0, gemsLeft=0;
  if(!S.log.flight) S.log.flight={seed:S.seed, score:0};

  function rp(r){ return { aspeed:Math.min(0.066,0.026+r*0.005), pspeed:Math.min(4.0,1.7+r*0.34), spawn:Math.max(18,60-r*5), spread:(r<3?0:Math.min(0.55,0.18+(r-3)*0.09)), triple:r>=3 }; }
  function spawnRing(r){ const n=Math.min(12,4+r); gemsTotal=n; gemsLeft=n; orbs=[]; const off=Math.random()*TAU; for(let i=0;i<n;i++) orbs.push({ang:off+i*(TAU/n)+(Math.random()-0.5)*0.18,got:false,fx:0}); }
  function angDiff(a,b){ let d=(a-b)%TAU; if(d>Math.PI)d-=TAU; if(d<-Math.PI)d+=TAU; return d; }
  function orbitScore(){ return Math.round(oscore*M); }

  function fire(P){
    const ST=44, speed=P.pspeed, travel=(R-ST)/speed, roll=Math.random();
    if(round>=4 && Math.random()<Math.min(0.20,0.05+round*0.012)){ const n=6+Math.min(4,round-4), b=Math.random()*TAU, skip=Math.floor(Math.random()*n); for(let i=0;i<n;i++){ if(i===skip) continue; projs.push({ang:b+i*(TAU/n),r:ST,speed:speed*0.85,scored:false}); } fireFx=1; shake=Math.max(shake,3); return; }
    if(P.triple && Math.random()<P.spread){ const base=(Math.random()<0.6)? ang+dir*P.aspeed*travel+(Math.random()*2-1)*0.10 : Math.random()*TAU; for(const d of [-0.30,0,0.30]) projs.push({ang:base+d,r:ST,speed,scored:false}); fireFx=1; shake=Math.max(shake,2.6); return; }
    let bse;
    if(roll<0.5) bse=ang+dir*P.aspeed*travel+(Math.random()*2-1)*0.12;
    else if(roll<0.78) bse=ang+(Math.random()*2-1)*0.5;
    else bse=Math.random()*TAU;
    projs.push({ang:bse,r:ST,speed,scored:false});
    fireFx=1; shake=Math.max(shake,2.2);
  }
  function roundClear(){
    state="roundclear"; oscore+=100*round; projs=[]; phaseT=100; clearFx=1; shake=Math.max(shake,4);
    waves.push({r:14,a:1}); const COL=["#0F7A7A","#2F9E9B","#F5A05A","#FFD27A","#ffffff"];
    for(let i=0;i<48;i++){ const an=Math.random()*TAU, sp=2.4+Math.random()*4.4; parts.push({x:CX,y:CY,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp-2.4,rot:Math.random()*6,vr:(Math.random()-.5)*0.5,col:COL[i%COL.length],life:1}); }
  }
  function onHit(){
    if(state!=="play") return;
    const rx=CX+R*Math.cos(ang), ry=CY+R*Math.sin(ang);
    state="dying"; dyingT=0; hitFx=1; shake=12; ex={x:rx,y:ry,r:6,a:1};
    const COL=["#2F9E9B","#F5A05A","#CFF0EA","#FFD27A","#0F7A7A"];
    for(let i=0;i<22;i++){ const an=Math.random()*TAU, sp=1.5+Math.random()*4; parts.push({x:rx,y:ry,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp,rot:Math.random()*6,vr:(Math.random()-.5)*0.6,col:COL[i%COL.length],life:1}); }
  }

  function stepUpd(){
    spin+=0.05; fireFx*=0.9; shake*=0.86; hitFx*=0.95; clearFx*=0.93; if(shield>0)shield--;
    for(const p of parts){ p.vy+=0.13; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.rot+=p.vr; p.life-=0.013; } parts=parts.filter(p=>p.life>0);
    for(const w of waves){ w.r+=6.2; w.a-=0.028; } waves=waves.filter(w=>w.a>0);
    if(state==="demo"){
      ang+=dir*0.034;
      spawnT--; if(spawnT<=0){ const b=ang+dir*0.6+(Math.random()*2-1)*0.2; projs.push({ang:b,r:40,speed:2.2,scored:false}); fireFx=1; spawnT=70+Math.random()*30; }
      for(const p of projs){ p.r+=p.speed; }
      let danger=null,dmin=1;
      for(const p of projs){ if(p.r>R-46 && p.r<R+14){ const ad=angDiff(p.ang,ang); if(Math.abs(ad)<0.5 && Math.abs(ad)<Math.abs(dmin)){ danger=p; dmin=ad; } } }
      if(danger){ dir = dmin>0 ? -1 : 1; }
      else { let nd=9; for(const o of orbs){ if(!o.got){ const ad=angDiff(o.ang,ang); if(Math.abs(ad)<Math.abs(nd)) nd=ad; } } if(nd<9 && Math.abs(nd)>0.05) dir = nd>0?1:-1; }
      for(const o of orbs){ if(!o.got && Math.abs(angDiff(o.ang,ang))<0.15){ o.got=true; o.fx=1; gemsLeft--; if(gemsLeft<=0) spawnRing(1); } if(o.fx>0)o.fx-=0.05; }
      orbs=orbs.filter(o=> !o.got || o.fx>0);
      projs=projs.filter(p=> p.r < Sq*0.62);
    }
    if(state==="play"){
      const P=rp(round); t++;
      ang+=dir*P.aspeed;
      spawnT--; if(spawnT<=0){ fire(P); spawnT=P.spawn+Math.random()*14; }
      for(const p of projs){ p.r+=p.speed; if(!p.scored && p.r>R+16){ p.scored=true; oscore+=2; } }
      for(const p of projs){ if(shield<=0 && Math.abs(p.r-R)<13 && Math.abs(angDiff(p.ang,ang))<0.17){ onHit(); break; } }
      projs=projs.filter(p=> p.r < Sq*0.62);
      for(const o of orbs){ if(!o.got && Math.abs(angDiff(o.ang,ang))<0.15){ o.got=true; o.fx=1; oscore+=10; gemsLeft--; if(gemsLeft<=0) roundClear(); } if(o.fx>0)o.fx-=0.05; }
      orbs=orbs.filter(o=> !o.got || o.fx>0);
    } else if(state==="roundclear"){
      phaseT--; if(phaseT<=0){ round++; spawnRing(round); spawnT=42; shield=Math.max(shield,Math.min(100,50+round*2)); state="play"; }
    }
    else if(state==="dying"){ dyingT++; if(ex){ ex.r+=4; ex.a-=0.05; } if(dyingT>52){ if(!S.revived) rescue(); else over(); } }
    else if(state==="reviving"){ reviveT++; if(reviveT>46){ state="revwait"; countdown(()=>{ state="play"; shield=200; }); } }
  }

  function neb(x,y,r,col){ const g=ctx.createRadialGradient(x,y,2,x,y,r); g.addColorStop(0,col); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); }
  function drawBg(){
    if(IMG.orbitBg){ ctx.drawImage(IMG.orbitBg,0,0,Sq,Sq); ctx.fillStyle="rgba(6,18,24,.16)"; ctx.fillRect(0,0,Sq,Sq); }
    else { const g=ctx.createRadialGradient(CX,CY,30,CX,CY,Sq*0.82); g.addColorStop(0,"#0E323C"); g.addColorStop(1,"#06161C"); ctx.fillStyle=g; ctx.fillRect(0,0,Sq,Sq); neb(CX*0.66,CY*0.55,Sq*0.42,"rgba(47,158,155,0.10)"); neb(CX*1.32,CY*1.28,Sq*0.44,"rgba(245,160,90,0.07)"); for(const s of stars){ ctx.globalAlpha=0.35+0.55*Math.abs(Math.sin(spin*0.5+s.tw)); ctx.fillStyle="#CFF0EA"; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,TAU); ctx.fill(); } ctx.globalAlpha=1; }

function startTimer(totalTenths){
  clearTimer();
  let left=totalTenths;
  const fill=document.getElementById("tfill"), lab=document.getElementById("tlab"), bar=document.getElementById("tbar");
  _timer=setInterval(()=>{
    left--;
    const sec=Math.ceil(left/10);
    if(fill) fill.style.width=(left/totalTenths*100)+"%";
    if(lab) lab.innerHTML=`⏱ <b>${sec}</b> сек`;
    if(bar && left<=totalTenths*0.4) bar.classList.add("warn");
    if(left<=0){ clearTimer(); timeUp(); }
  },100);
}

function toast(dm,du,dtm,rev){
  const parts=[];
  const money=dm+rev-CFG.burn;
  parts.push(span(money,"💰"));
  if(du) parts.push(span(du,"👥"));
  if(dtm) parts.push(span(dtm,"⚡"));
  const t=document.getElementById("toast");
  t.innerHTML=parts.join(""); t.classList.add("show");
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove("show"),1500);
}

      <div class="how-row"><span class="how-n">3</span><span><b>Финал — орбита.</b> Выведите стартап на орбиту: собирайте монеты Hayot и облетайте монеты монополиста — чем дальше, тем больше очков.</span></div>
    </div>

    <details class="rules rules-acc">
      <summary>📋 Правила и призы <span class="chev">▾</span></summary>
      <ul>
        <li><b>Цель.</b> Набрать максимум очков и подняться в таблице лидеров.</li>
        <li><b>Очки.</b> За состояние компании после каждого решения и за скорость ответа; на орбите — за собранные монеты Hayot и пройденные раунды.</li>
        <li><b>Деньги.</b> Если капитал кончится, Hayot Bank выдаст займ под небольшой процент — он чуть снизит итоговые очки.</li>
        <li><b>Попытки.</b> Пригласите друга — +10 попыток (до 100). В зачёт идёт лучший результат.</li>
        <li><b>Честная игра.</b> Варианты и эффекты меняются каждую партию. Боты и накрутка — дисквалификация.</li>
      </ul>
    </details>

    <div class="att">🎟 Попыток: <b id="attn">${att}</b></div>
    <button class="invite" onclick="invite()">📤 Пригласить друга (+10 попыток)</button>
    <button class="btn btn-primary" onclick="tryStart()" style="margin-top:10px;">🚀 Начать</button>
  </div>`;

function showDirs(){
  document.getElementById("hud").classList.add("hidden");
  document.getElementById("screen").innerHTML = `<div class="hero">
    ${LOGO}
    <h1>Выберите <span class="em">направление</span></h1>
    <p>Каждое направление — свой путь и свои вызовы. Дальше вас ждёт логическая цепочка решений: от идеи и прототипа до выручки, конкуренции и раунда.</p>
    <div class="dirs">
      ${DIRS.map(x=>`<button class="dirbtn" data-d="${x.id}"><span class="dico"><img class="dicoimg" data-asset="ic_${x.id}" src="${assetSrc('ic_'+x.id)}" alt=""></span><span class="dtxt"><b>${x.name}</b><span>${x.d}</span></span></button>`).join("")}
    </div>
  </div>`;
  document.querySelectorAll(".dirbtn").forEach(b=>b.addEventListener("click",()=>start(b.dataset.d)));
}
